name: Build and Deploy
on:
  pull_request:
    branches:
      - main 
  push:
    branches:
      - main 
env:
  APP_NAME: cert-manager
  VERSION: '${{ vars.VERSION }}.${{ github.run_number }}.${{ github.run_attempt }}'
  CHART_VERSION: v1.20.2
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }} 
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }} 
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }} 
  AZURE_GROUP_KUBERNETES: ${{ vars.AZURE_RESOURCE_GROUP_KUBERNETES }}
  AZURE_GROUP_DNS: ${{ vars.AZURE_RESOURCE_GROUP_DNS }}
  AZURE_SUBSCRIPTION_ID: ${{ github.ref == 'refs/heads/main' && secrets.PRODUCTION_AZURE_SUBSCRIPTION_ID || secrets.STAGING_AZURE_SUBSCRIPTION_ID }}
  KUBERNETES_NODEPOOL_COMPUTE: cpu
  KUBERNETES_NAMESPACE: ${{ vars.KUBERNETES_NAMESPACE }}
  KUBERNETES_REPLICA_COUNT: 2
  KUBERNETES_MEMORY_REQUEST: 128Mi
  KUBERNETES_MEMORY_LIMIT: 384Mi
  KUBERNETES_CPU_REQUEST: 50m
  KUBERNETES_CPU_LIMIT: 150m
  LETS_ENCRYPT_EMAIL: ${{ secrets.LETS_ENCRYPT_EMAIL }}
jobs:
  build-and-deploy:
    runs-on:
      - self-hosted
      - linux 
      - ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
    permissions:
      contents: write
    concurrency:
      group: ${{ github.repository }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        shell: pwsh
        run: |
          az login --service-principal -u $env:AZURE_CLIENT_ID -p $env:AZURE_CLIENT_SECRET --tenant $env:AZURE_TENANT_ID -o none;
          az account set -s $env:AZURE_SUBSCRIPTION_ID -o none;

          $env:KUBERNETES_CLUSTER = az aks list -g $env:AZURE_GROUP_KUBERNETES --query [0].name -o tsv;
          az aks get-credentials -g $env:AZURE_GROUP_KUBERNETES -n $env:KUBERNETES_CLUSTER -o none;
          
      - name: Deploy Cert-Manager
        shell: pwsh
        run: |
          $clientId = az identity list -g $env:AZURE_GROUP_DNS --query [0].clientId -o tsv;
          $zones = az network dns zone list -g $env:AZURE_GROUP_DNS | ConvertFrom-Json;

          $env:CLUSTER_ISSUER_SOLVERS = @(
              foreach ($zone in $zones) {
          @"
                - selector:
                    dnsZones:
                      - $($zone.name)
                  dns01:
                    azureDNS:
                      subscriptionID: $($env:AZURE_SUBSCRIPTION_ID)
                      resourceGroupName: $($env:AZURE_GROUP_DNS)
                      hostedZoneName: $($zone.name)
                      environment: AzurePublicCloud
                      managedIdentity:
                        clientID: $clientId
          "@
              }
          ) -join "`n";

          if ($LastExitCode -ne 0) 
          { 
              throw "error";
          }

          Get-Content .kubernetes/certmanager-values.yaml | foreach { [Environment]::ExpandEnvironmentVariables($_) } | Set-Content .kubernetes/certmanager-values.tmp.yaml;
          Get-Content .kubernetes/certmanager-cluster-issuer.yaml | foreach { [Environment]::ExpandEnvironmentVariables($_) } | Set-Content .kubernetes/certmanager-cluster-issuer.tmp.yaml;
          Get-Content .kubernetes/certmanager-service-monitor.yaml | foreach { [Environment]::ExpandEnvironmentVariables($_) } | Set-Content .kubernetes/certmanager-service-monitor.tmp.yaml;

          helm upgrade --install $env:APP_NAME oci://quay.io/jetstack/charts/cert-manager --atomic --namespace $env:KUBERNETES_NAMESPACE --version $env:CHART_VERSION -f .kubernetes/certmanager-values.tmp.yaml;
          if ($LastExitCode -ne 0) 
          { 
              throw "error";
          }

          kubectl apply -f .kubernetes/certmanager-cluster-issuer.tmp.yaml;
          if ($LastExitCode -ne 0) 
          { 
              throw "error";
          }

          kubectl apply -f .kubernetes/certmanager-service-monitor.tmp.yaml;
          if ($LastExitCode -ne 0) 
          { 
              throw "error";
          }

      - name: Create DNS Zone Credentials
        shell: pwsh
        run: |
          $env:APP_NAME_IDENTITY = az identity list --resource-group $env:AZURE_GROUP_DNS --query [0].name -o tsv;
          $env:APP_NAME_IDENTITY_CREDENTIAL = $env:APP_NAME_IDENTITY + "-certmanager";
          $env:KUBERNETES_ISSUER_URL = az aks list -g $env:AZURE_GROUP_KUBERNETES --query [0].[oidcIssuerProfile.issuerUrl] -o tsv;
          $env:SUBJECT = "system:serviceaccount:" + $env:KUBERNETES_NAMESPACE + ":cert-manager";

          $existing = az identity federated-credential list `
              -g $env:AZURE_GROUP_DNS `
              --identity-name $env:APP_NAME_IDENTITY `
              --query "[?issuer=='$env:KUBERNETES_ISSUER_URL' && subject=='$env:SUBJECT'] | [0].name" -o tsv;

          if (-not $existing) 
          {
              az identity federated-credential create `
                  -g $env:AZURE_GROUP_DNS `
                  -n $env:APP_NAME_IDENTITY_CREDENTIAL `
                  --identity-name $env:APP_NAME_IDENTITY `
                  --issuer $env:KUBERNETES_ISSUER_URL `
                  --subject $env:SUBJECT;

              if ($LastExitCode -ne 0)
              { 
                  throw "error";
              }
          }

      - name: Update Azure Policies
        shell: pwsh
        run: |
          $currentPorts = @(az policy assignment show -n SecurityCenterBuiltIn --scope "/subscriptions/$env:AZURE_SUBSCRIPTION_ID" --query "parameters.allowedservicePortsInKubernetesClusterPorts.value" -o json | ConvertFrom-Json | Where-Object { $_ -ne "-1" });

          $ports = @("443","9402");
          $missingPorts = $ports | Where-Object { $currentPorts -notcontains $_ };

          if ($missingPorts.Count -gt 0) {
              $mergedPorts = ($currentPorts + $missingPorts) | Select-Object -Unique;
              $mergedPortsJson = $mergedPorts | ConvertTo-Json -Compress;

              az policy assignment update `
                  -n SecurityCenterBuiltIn `
                  --scope "/subscriptions/$env:AZURE_SUBSCRIPTION_ID" `
                  --params "{`"allowedservicePortsInKubernetesClusterPorts`":{`"value`":$mergedPortsJson}}";
          }

      - name: GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            Version: ${{ env.VERSION }}
            Commit: ${{ github.sha }}
            Build run: ${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
